<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小红书分析助手</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 320px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #fff;
    color: #1f2937;
  }
  .header {
    background: linear-gradient(135deg, #4F46E5, #7C3AED);
    color: #fff;
    padding: 16px 20px;
  }
  .header h1 { font-size: 16px; font-weight: 600; }
  .header .subtitle { font-size: 11px; opacity: 0.8; margin-top: 2px; }

  .body { padding: 16px 20px; }

  .status-badge {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 12px; padding: 4px 10px; border-radius: 12px;
    margin-bottom: 12px;
  }
  .status-badge.active { background: #D1FAE5; color: #065F46; }
  .status-badge.inactive { background: #FEE2E2; color: #991B1B; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; }
  .status-dot.active { background: #10B981; }
  .status-dot.inactive { background: #EF4444; }

  .api-key-row {
    margin-bottom: 12px;
  }
  .api-key-row label {
    display: block; font-size: 12px; font-weight: 500;
    color: #6B7280; margin-bottom: 4px;
  }
  .api-key-row input {
    width: 100%; padding: 6px 10px; font-size: 12px;
    border: 1px solid #D1D5DB; border-radius: 6px; outline: none;
  }
  .api-key-row input:focus { border-color: #4F46E5; }

  .btn {
    width: 100%; padding: 10px 0; font-size: 14px; font-weight: 600;
    border: none; border-radius: 8px; cursor: pointer;
    color: #fff; background: #4F46E5;
    transition: background 0.2s;
  }
  .btn:hover { background: #4338CA; }
  .btn:disabled { background: #9CA3AF; cursor: not-allowed; }

  .status-text {
    margin-top: 10px; font-size: 12px; color: #6B7280;
    text-align: center; min-height: 18px;
  }
  .status-text.success { color: #059669; }
  .status-text.error { color: #DC2626; }

  .footer {
    border-top: 1px solid #E5E7EB; padding: 10px 20px;
    font-size: 11px; color: #9CA3AF; text-align: center;
  }
</style>
</head>
<body>
<div class="header">
  <h1>小红书分析助手</h1>
  <div class="subtitle">一键抓取 &middot; AI 深度分析</div>
</div>

<div class="body">
  <div id="badge"></div>

  <div class="api-key-row">
    <label for="apiKey">DeepSeek API Key</label>
    <input type="password" id="apiKey" placeholder="sk-...">
  </div>

  <button class="btn" id="analyzeBtn" disabled>开始分析</button>

  <div class="status-text" id="statusText"></div>
</div>

<div class="footer">仅支持 xiaohongshu.com/explore 页面</div>

<script src="popup.js"></script>
</body>
</html>
